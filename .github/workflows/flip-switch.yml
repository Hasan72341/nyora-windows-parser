name: Flip source switch
# Signs config.json AND deploys it to GitHub Pages via Actions (not the legacy
# Jekyll builder, which was getting stuck). Run from the Actions tab.
# (The Android switch lives in its own repo: Hasan72341/nyora-android-switch.)
on:
  workflow_dispatch:
    inputs:
      enabled:
        description: "Enable sources for all installed apps?"
        type: choice
        options: ["false", "true"]
        default: "false"
      sources:
        description: 'Source ids (comma-separated) or * for all'
        default: "*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  flip:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Sign config.json
        env:
          KEY: ${{ secrets.REPO_SIGNING_KEY }}
          ENABLED: ${{ inputs.enabled }}
          SOURCES: ${{ inputs.sources }}
        run: |
          set -euo pipefail
          printf '%s\n' "$KEY" > key.pem
          SRC_JSON=$(python3 -c "import sys,json;print(json.dumps([s.strip() for s in sys.argv[1].split(',') if s.strip()]))" "$SOURCES")
          printf '{"v":1,"enabled":%s,"sources":%s}' "$ENABLED" "$SRC_JSON" > payload.json
          DATA=$(base64 -w0 payload.json)
          SIG=$(openssl pkeyutl -sign -inkey key.pem -rawin -in payload.json | base64 -w0)
          printf '{"data":"%s","sig":"%s"}' "$DATA" "$SIG" > config.json
          rm -f key.pem payload.json
          echo "payload: $(base64 -d <<< "$DATA")"
      - name: Commit to git (traceability)
        run: |
          git config user.name  "nyora-bot"
          git config user.email "bot@users.noreply.github.com"
          git add config.json
          git diff --cached --quiet || { git commit -m "flip switch: enabled=${{ inputs.enabled }}"; git push; }
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
