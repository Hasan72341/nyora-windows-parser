<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nyora — Source Repository</title>
  <style>
    :root { color-scheme: dark light; }
    body { margin:0; min-height:100vh; display:grid; place-items:center;
      font:16px/1.6 -apple-system,Segoe UI,Roboto,sans-serif;
      background:#0b0b0d; color:#e7e7ea; padding:24px; }
    .card { max-width:520px; text-align:center; }
    h1 { font-size:28px; letter-spacing:.06em; margin:0 0 8px; }
    code { background:#1a1a1f; padding:3px 8px; border-radius:8px; font-size:14px; }
    a { color:#8ab4ff; }
    .u { margin-top:18px; word-break:break-all; }
    small { color:#9a9aa2; }
  </style>
</head>
<body>
  <div class="card">
    <h1>NYORA</h1>
    <p>Source repository index for the Nyora desktop reader.</p>
    <p class="u"><small>Add this link in the app under Explore → Add a source repository:</small><br>
      <code id="u"></code></p>
    <p><small>The index is signed; only Nyora verifies and loads it.</small></p>
  </div>
  <script>document.getElementById('u').textContent = location.origin + location.pathname.replace(/index\.html$/,'') + 'nyora-repo.json';</script>
</body>
</html>
